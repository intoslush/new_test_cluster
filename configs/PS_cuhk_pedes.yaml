train_file:  ['./re_id/CUHK-PEDES/processed_data/train.json']
val_file: './re_id/CUHK-PEDES/processed_data/val.json'
test_file: './re_id/CUHK-PEDES/processed_data/test.json'
train_image_root: './re_id/CUHK-PEDES/imgs'
val_image_root: './re_id/CUHK-PEDES/imgs'
test_image_root: './re_id/CUHK-PEDES/imgs'

bert_config: 'configs/config_bert.json'

max_words: 50
image_res: 384
batch_size_train: 16
batch_size_test: 64

mlm_probability: 0.15
weak_pos_pair_probability: 0.1
mrtd_mask_probability: 0.3
queue_size: 65536
momentum: 0.995
vision_width: 768
embed_dim: 256
temp: 0.07
k_test: 128

alpha: 0.4
warm_up: True

optimizer: {opt: adamW, lr: 1e-5, weight_decay: 0.02, lr_custm: 1e-4}
schedular: {sched: cosine, lr: 1e-5, epochs: 35, min_lr: 2e-6, decay_rate: 1, warmup_lr: 1e-5, warmup_epochs: 1, cooldown_epochs: 0}

eval_epoch: 0


weights: {"loss_cl": 0.5, "loss_itm": 1, "loss_mlm": 1, "loss_prd": 0.5, "loss_mrtd": 0.5,"loss_sim": 0.5, "loss_itm_softmask": 1}
# 新增的权重调度配置
weights_schedule:
  freeze_epochs: 40     # 前 20 个 epoch 不变
  mode: "cosine"        # 可改为 "cosine" 获得更平滑的变化linear
  normalize_sum: false  # 若希望总权重和保持不变可改为 true
  loss_cl:
    min: 0            # 20 之后从 0.5 线性降到 0.1（到最后一个 epoch 达到）
  loss_mlm:
    max: 1.5 
  loss_itm:
    min: 0.2 
    max: 1.5

use_momentum_queue: True #是否使用动量
use_queue: True #是否使用队列
reset_queue_each_epoch: True  #每个epoch是否重置队列
enable_cl_loss: True
itm_neg_sampling  : 'cl' # 一个参数决定采样方式：'cl' or 'random'，如果关cl需要改为random

enable_mlm_loss:  True
saliency_compute_epoch: 10 #计算saliency的epoch
debug_mask_epoch: 10  #用来输出可视化的mask词的epoch
mlm_soft_label: False
debug_log_saliency: False  #用来输出可视化的mask词

cluster_feature_mode : "image"
cluster_fusion_use_proj : False   # 保持“融合 CLS 原始特征”
# cluster_text_key : "caption1"     # 也可改 caption1
cluster_min_samples : 3
cluster_eps : 0.6

# Cross-Modal Confidence Calibration
# 保持现有扁平配置风格；代码同时兼容 MODEL.USE_CONF_CALIBRATION 等写法
# 已完成最小 GPU smoke test：
# 1) 聚类 -> confidence calibration -> training -> evaluation 全链路可跑通
# 2) 当前工程里真正会吃到 confidence 的是 pseudo-supervised contrastive loss
#    因此实验时需要打开 conf_weight_metric_loss
use_conf_calibration: True
conf_alpha: 1.0
conf_beta: 1.0
conf_temp: 1.0
conf_noise_value: 0.05
conf_high_thres: 0.7
conf_low_thres: 0.3
conf_weight_id_loss: True
conf_weight_metric_loss: True
conf_use_text_prototype: True
conf_debug_log: True
conf_chunk_size: 4096
conf_min_cluster_size: 1


enable_itm_loss: True
